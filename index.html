<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2f5a8f" />
  <meta name="color-scheme" content="light" />
  <title>Read Aloud</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Read Aloud" />

  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="app">
    <header class="masthead">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/>
          <path d="M16.5 8.5a5 5 0 0 1 0 7"
                fill="none" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round"/>
          <path d="M19 6a8.5 8.5 0 0 1 0 12"
                fill="none" stroke="currentColor"
                stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="titles">
        <h1>Read Aloud</h1>
        <p class="status" id="status" aria-live="polite">Idle</p>
      </div>
    </header>

    <main>
      <label class="field-label" for="text">Text to read</label>
      <textarea id="text"
                placeholder="Type or paste text here&hellip;"
                spellcheck="false"
                autocapitalize="sentences"
                autocorrect="off"></textarea>
      <div id="preview" class="preview" hidden></div>
      <div class="counter"><span id="count">0</span> characters</div>

      <button id="speakText" class="btn btn-primary">Read text</button>

      <div class="transport" role="group" aria-label="Playback">
        <button id="pause" class="chip" disabled>Pause</button>
        <button id="resume" class="chip" disabled>Resume</button>
        <button id="stop" class="chip chip-stop" disabled>Stop</button>
      </div>

      <details class="settings">
        <summary>Voice &amp; speed</summary>

        <div class="setting">
          <label for="voice">Voice</label>
          <select id="voice"></select>
        </div>

        <div class="setting">
          <label for="rate">Speed <span class="val" id="rateVal">1.0&times;</span></label>
          <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" />
        </div>

        <div class="setting">
          <label for="pitch">Pitch <span class="val" id="pitchVal">1.0</span></label>
          <input type="range" id="pitch" min="0" max="2" step="0.1" value="1" />
        </div>

        <div class="setting">
          <label for="volume">Volume <span class="val" id="volumeVal">100%</span></label>
          <input type="range" id="volume" min="0" max="1" step="0.05" value="1" />
        </div>
      </details>

      <p class="hint" id="hint" hidden></p>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
